<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Unit Converter</title>
    <script src="index.js" defer></script>
    
</head>
<body>
    <h1 class="title">Unit Converter</h1>
<div class="container">
    <div class="flex-container">
        <div class="card">
            <h2 class="subtitle">
                Length (Meters/Feet)
            </h2>
            <input id="length" class="input-el" type="number" placeholder="Length measurements">
            <button id="convertLength-btn" class="convertBtns">CONVERT</button>
            <h3 id="lengthResult" class="result">
                -
            </h3>    
        </div>
        <div class="card">
            <h2 class="subtitle">
                Volume (Liters/gallons)
            </h2>
            <input id="volume" class="input-el" type="number" placeholder="Volume measurements">
            <button id="convertVolume-btn" class="convertBtns">CONVERT</button>
            <h3 id="volumeResult" class="result">
                -
            </h3>
        </div>
        <div class="card">
            <h2 class="subtitle">
                Mass (Kilos/Pounds)
            </h2>
            <input id="mass" class="input-el" type="number" placeholder="Mass measurements">
            <button id="convertMass-btn" class="convertBtns">CONVERT</button>
            <h3 id="massResult" class="result">
                -
            </h3>
        </div>
    </div>
</div>
</body>
</html>
